<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记忆回廊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #f5efe4;
    --bg2:      #ede5d6;
    --bg3:      #e8dfc8;
    --ink:      #2a2118;
    --ink-lt:   #5a4e40;
    --mist:     #9a8e7e;
    --terra:    #b85c38;
    --terra-lt: #d4805e;
    --sage:     #5a7a5e;
    --sage-lt:  #82a886;
    --dusty:    #8a5a7a;
    --dusty-lt: #b07fa0;
    --gold:     #a07830;
    --gold-lt:  #c49a50;
    --sky:      #4a7090;
    --sky-lt:   #6a94b4;
    --m: clamp(1.5rem, 5vw, 4.5rem);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg); color:var(--ink); font-family:'Noto Serif SC',serif; overflow-x:hidden; }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.028'/%3E%3C/svg%3E");
    pointer-events:none; z-index:9999;
  }

  /* HERO */
  #hero { min-height:100vh; display:grid; grid-template-columns:1.1fr 0.9fr; overflow:hidden; }
  .hero-left { padding:var(--m); display:flex; flex-direction:column; justify-content:space-between; background:var(--bg); position:relative; z-index:2; }
  .hero-left::before { content:''; position:absolute; top:0; left:var(--m); right:var(--m); height:3px; background:linear-gradient(90deg,var(--terra),var(--sage),var(--dusty),var(--gold)); }
  .eyebrow { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:0.85rem; color:var(--terra); letter-spacing:0.28em; padding-top:2.5rem; }
  .hero-title { font-family:'Playfair Display',serif; font-size:clamp(4.5rem,10vw,9rem); font-weight:900; line-height:0.88; letter-spacing:-0.03em; color:var(--ink); }
  .hero-title .accent { font-style:italic; color:var(--terra); display:block; }
  .hero-sub { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:clamp(1rem,2vw,1.3rem); color:var(--mist); line-height:1.85; max-width:36ch; border-left:2px solid var(--gold-lt); padding-left:1.2rem; }
  .hero-nav { display:flex; flex-direction:column; gap:0.5rem; padding-bottom:2.5rem; }
  .hero-nav a { text-decoration:none; display:flex; align-items:center; gap:0.9rem; font-family:'Cormorant Garamond',serif; font-size:0.85rem; letter-spacing:0.15em; color:var(--ink-lt); transition:color 0.3s,gap 0.3s; }
  .nav-pip { width:20px; height:2px; flex-shrink:0; transition:width 0.3s; }
  .hero-nav a:nth-child(1) .nav-pip { background:var(--terra); }
  .hero-nav a:nth-child(2) .nav-pip { background:var(--sage); }
  .hero-nav a:nth-child(3) .nav-pip { background:var(--gold); }
  .hero-nav a:nth-child(4) .nav-pip { background:var(--dusty); }
  .hero-nav a:hover { color:var(--ink); }
  .hero-nav a:hover .nav-pip { width:36px; }
  .hero-right { position:relative; overflow:hidden; background:var(--bg2); }
  .hero-right::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse 65% 55% at 25% 25%,rgba(184,92,56,0.28) 0%,transparent 60%), radial-gradient(ellipse 55% 65% at 75% 65%,rgba(90,122,94,0.22) 0%,transparent 60%), radial-gradient(ellipse 50% 45% at 55% 90%,rgba(138,90,122,0.2) 0%,transparent 55%), radial-gradient(ellipse 40% 40% at 85% 15%,rgba(160,120,48,0.2) 0%,transparent 50%), radial-gradient(ellipse 35% 35% at 10% 80%,rgba(74,112,144,0.18) 0%,transparent 50%); }
  .hero-ghost { position:absolute; font-family:'Playfair Display',serif; font-style:italic; font-weight:900; font-size:clamp(7rem,16vw,16rem); line-height:1; color:rgba(42,33,24,0.07); top:50%; left:50%; transform:translate(-50%,-50%); user-select:none; pointer-events:none; white-space:nowrap; letter-spacing:0.05em; }
  .hero-corner { display:none; }
  .seal { position:absolute; top:2.2rem; right:2.2rem; width:clamp(50px,5.5vw,72px); opacity:0.92; z-index:3; mix-blend-mode:multiply; }
  .colophon { position:absolute; bottom:2.5rem; right:2.2rem; text-align:right; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:0.75rem; color:rgba(42,33,24,0.32); line-height:1.9; z-index:3; }

  /* SECTIONS */
  .sec { padding:clamp(5rem,10vh,8rem) var(--m); position:relative; }
  .sec-label { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:0.8rem; letter-spacing:0.3em; text-transform:uppercase; margin-bottom:3rem; display:flex; align-items:center; gap:1rem; color:var(--mist); }
  .sec-label::after { content:''; height:1px; width:4rem; background:currentColor; opacity:0.3; }

  /* WRITINGS */
  #writings { background:var(--bg); }
  .writings-grid { display:grid; grid-template-columns:1fr 1fr; gap:3px; max-width:920px; }
  .w-card { padding:2.5rem; cursor:pointer; transition:background 0.3s,transform 0.3s; position:relative; overflow:hidden; }
  .w-card:hover { transform:translateY(-2px); }
  .w-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
  .w-feat { grid-column:1/-1; background:rgba(184,92,56,0.06); border:1px solid rgba(184,92,56,0.12); }
  .w-feat::before { background:linear-gradient(90deg,var(--terra),var(--gold-lt)); }
  .w-feat:hover { background:rgba(184,92,56,0.1); }
  .w-2 { background:rgba(90,122,94,0.05); border:1px solid rgba(90,122,94,0.12); }
  .w-2::before { background:var(--sage); }
  .w-2:hover { background:rgba(90,122,94,0.09); }
  .w-3 { background:rgba(138,90,122,0.05); border:1px solid rgba(138,90,122,0.12); }
  .w-3::before { background:var(--dusty); }
  .w-3:hover { background:rgba(138,90,122,0.09); }
  .w-date { font-size:0.65rem; letter-spacing:0.2em; color:var(--mist); text-transform:uppercase; margin-bottom:0.8rem; }
  .w-title { font-family:'Playfair Display',serif; font-size:clamp(1.1rem,2.2vw,1.5rem); font-weight:700; line-height:1.3; margin-bottom:0.9rem; color:var(--ink); }
  .w-feat .w-title { font-size:clamp(1.3rem,2.8vw,2rem); }
  .w-excerpt { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1rem; color:var(--ink-lt); line-height:1.8; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .w-feat .w-excerpt { -webkit-line-clamp:4; }
  .w-more { display:inline-block; margin-top:1.2rem; font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--terra); text-decoration:none; }
  .w-more:hover { text-decoration:underline; }

  /* CHARACTERS */
  #characters { background:var(--bg2); }
  .chars-wrap { display:grid; grid-template-columns:1fr 1fr; gap:2px; max-width:900px; }
  .char-card { padding:3rem 2.5rem; position:relative; overflow:hidden; transition:transform 0.3s; }
  .char-card:hover { transform:translateY(-3px); }
  .char-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; }
  .char-1 { background:linear-gradient(160deg,rgba(160,120,48,0.08) 0%,rgba(184,92,56,0.06) 100%); border:1px solid rgba(160,120,48,0.15); }
  .char-1::after { background:linear-gradient(90deg,var(--gold),var(--terra-lt)); }
  .char-2 { background:linear-gradient(160deg,rgba(138,90,122,0.08) 0%,rgba(74,112,144,0.06) 100%); border:1px solid rgba(138,90,122,0.15); }
  .char-2::after { background:linear-gradient(90deg,var(--dusty),var(--sky)); }
  .char-num { position:absolute; top:1.5rem; right:2rem; font-family:'Playfair Display',serif; font-style:italic; font-weight:900; font-size:7rem; line-height:1; color:rgba(42,33,24,0.04); user-select:none; }
  .char-tag { display:inline-block; font-size:0.6rem; letter-spacing:0.22em; text-transform:uppercase; padding:0.2em 0.8em; border-radius:2px; margin-bottom:1.5rem; }
  .char-1 .char-tag { background:rgba(160,120,48,0.15); color:var(--gold); }
  .char-2 .char-tag { background:rgba(138,90,122,0.15); color:var(--dusty); }
  .char-name { font-family:'Playfair Display',serif; font-size:3rem; font-weight:700; line-height:1; margin-bottom:0.2rem; color:var(--ink); }
  .char-name-en { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:0.9rem; margin-bottom:1.5rem; letter-spacing:0.1em; }
  .char-1 .char-name-en { color:var(--gold); }
  .char-2 .char-name-en { color:var(--dusty); }
  .char-desc { font-size:0.9rem; color:var(--ink-lt); line-height:1.9; }
  .char-note { margin-top:1.5rem; padding-top:1.2rem; border-top:1px solid rgba(42,33,24,0.08); font-family:'Cormorant Garamond',serif; font-style:italic; font-size:0.85rem; color:var(--mist); }

  /* THOUGHTS */
  #thoughts { background:var(--bg3); }
  .thoughts-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; max-width:900px; }
  .thought { padding:2rem 2rem 1.5rem; background:rgba(245,239,228,0.7); border:1px solid rgba(42,33,24,0.07); position:relative; }
  .thought-text { font-family:'Cormorant Garamond',serif; font-size:clamp(1.05rem,2vw,1.25rem); line-height:1.85; color:var(--ink); }
  .thought:nth-child(1) em{color:var(--terra);}
  .thought:nth-child(2) em{color:var(--sage);}
  .thought:nth-child(3) em{color:var(--gold);}
  .thought:nth-child(4) em{color:var(--dusty);}
  .thought:nth-child(5) em{color:var(--sky);}
  .thought-date { margin-top:1rem; font-size:0.65rem; letter-spacing:0.2em; color:var(--mist); text-transform:uppercase; }

  /* ARCHIVE */
  #archive { background:var(--bg); }
  .archive-mosaic { display:grid; grid-template-columns:repeat(12,1fr); grid-auto-rows:70px; gap:4px; max-width:960px; }
  .a-cell { position:relative; overflow:hidden; transition:filter 0.3s,transform 0.3s; display:flex; align-items:flex-end; padding:0.7rem; }
  .a-cell:hover { filter:brightness(0.92) saturate(1.1); transform:scale(1.015); z-index:2; }
  .a-cell:nth-child(1){grid-column:span 5;grid-row:span 4;background:linear-gradient(135deg,rgba(184,92,56,0.18),rgba(160,120,48,0.12));border:1px solid rgba(184,92,56,0.1);}
  .a-cell:nth-child(2){grid-column:span 4;grid-row:span 2;background:linear-gradient(160deg,rgba(90,122,94,0.15),rgba(74,112,144,0.1));border:1px solid rgba(90,122,94,0.1);}
  .a-cell:nth-child(3){grid-column:span 3;grid-row:span 2;background:linear-gradient(200deg,rgba(138,90,122,0.15),rgba(184,92,56,0.08));border:1px solid rgba(138,90,122,0.1);}
  .a-cell:nth-child(4){grid-column:span 3;grid-row:span 2;background:linear-gradient(135deg,rgba(160,120,48,0.15),rgba(90,122,94,0.1));border:1px solid rgba(160,120,48,0.1);}
  .a-cell:nth-child(5){grid-column:span 4;grid-row:span 2;background:linear-gradient(135deg,rgba(74,112,144,0.15),rgba(138,90,122,0.1));border:1px solid rgba(74,112,144,0.1);}
  .a-cell:nth-child(6){grid-column:span 4;grid-row:span 3;background:linear-gradient(160deg,rgba(184,92,56,0.12),rgba(160,120,48,0.1));border:1px solid rgba(184,92,56,0.08);}
  .a-cell:nth-child(7){grid-column:span 4;grid-row:span 1;background:linear-gradient(135deg,rgba(90,122,94,0.12),rgba(74,112,144,0.08));border:1px solid rgba(90,122,94,0.08);}
  .a-cell:nth-child(8){grid-column:span 4;grid-row:span 2;background:linear-gradient(135deg,rgba(138,90,122,0.12),rgba(184,92,56,0.08));border:1px solid rgba(138,90,122,0.08);}
  .a-label { font-size:0.6rem; letter-spacing:0.15em; color:rgba(42,33,24,0.35); text-transform:uppercase; line-height:1.6; }

  /* FOOTER */
  footer { background:var(--bg2); border-top:1px solid rgba(42,33,24,0.08); padding:4rem var(--m); display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:2rem; position:relative; }
  footer::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--terra),var(--sage),var(--dusty),var(--gold),var(--sky)); }
  .footer-quote { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1rem; color:var(--ink-lt); line-height:1.7; }
  .footer-mark { font-family:'Playfair Display',serif; font-style:italic; font-weight:900; font-size:2.2rem; text-align:center; color:var(--ink); }
  .footer-meta { text-align:right; font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--mist); line-height:2.2; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)} }
  .eyebrow    { opacity:0; animation:fadeUp 0.9s 0.2s forwards; }
  .hero-title { opacity:0; animation:fadeUp 0.9s 0.5s forwards; }
  .hero-sub   { opacity:0; animation:fadeUp 0.9s 0.8s forwards; }
  .hero-nav   { opacity:0; animation:fadeUp 0.9s 1.0s forwards; }

  @media(max-width:680px){
    #hero{grid-template-columns:1fr}
    .hero-right{height:38vh}
    .writings-grid,.chars-wrap,.thoughts-grid{grid-template-columns:1fr}
    .writings-grid .w-feat{grid-column:1}
    footer{grid-template-columns:1fr;text-align:center}
    .footer-meta{text-align:center}
  }
</style>
</head>
<body>

<section id="hero">
  <div class="hero-left">
    <div class="eyebrow">私人档案 · Archive personnelle</div>
    <div>
      <h1 class="hero-title">记忆<span class="accent">回廊</span></h1>
      <p class="hero-sub" style="margin-top:2rem">一些发生过的事情，一些还没有发生的人，一些想清楚了的和没有想清楚的。</p>
    </div>
    <nav class="hero-nav">
      <a href="#writings"><span class="nav-pip"></span>文字 · Writings</a>
      <a href="#characters"><span class="nav-pip"></span>人物 · Characters</a>
      <a href="#thoughts"><span class="nav-pip"></span>碎想 · Fragments</a>
      <a href="#archive"><span class="nav-pip"></span>影像 · Archive</a>
    </nav>
  </div>
  <div class="hero-right">
    <div class="hero-ghost">HUI</div>
    <img src="seal.png" class="seal" alt="陶慧">
    <div class="colophon">私·人·档·案<br>2025 —</div>
  </div>
</section>

<section class="sec" id="writings">
  <div class="sec-label">文字 · Writings</div>
  <div class="writings-grid" id="writings-container"></div>
</section>

<section class="sec" id="characters">
  <div class="sec-label">人物 · Characters</div>
  <div class="chars-wrap" id="characters-container"></div>
</section>

<section class="sec" id="thoughts">
  <div class="sec-label">碎想 · Fragments</div>
  <div class="thoughts-grid" id="thoughts-container"></div>
</section>

<section class="sec" id="archive">
  <div class="sec-label">影像 · Archive</div>
  <div class="archive-mosaic">
    <div class="a-cell"><div class="a-label">Brisbane<br>2024.10</div></div>
    <div class="a-cell"><div class="a-label">某个夜市</div></div>
    <div class="a-cell"><div class="a-label">无题</div></div>
    <div class="a-cell"><div class="a-label">南方</div></div>
    <div class="a-cell"><div class="a-label">光线研究</div></div>
    <div class="a-cell"><div class="a-label">窗</div></div>
    <div class="a-cell"><div class="a-label">路过</div></div>
    <div class="a-cell"><div class="a-label">某年某月</div></div>
  </div>
</section>

<footer>
  <div class="footer-quote">这里存放的东西<br>不打算被所有人读懂。</div>
  <div class="footer-mark">记忆回廊</div>
  <div class="footer-meta">私人档案<br>2025 —<br>Brisbane</div>
</footer>

<script>
const REPO = 'lilith2025-pixel/memory-corridor';
const thoughtColors = ['var(--terra)','var(--sage)','var(--gold)','var(--dusty)','var(--sky)'];

function parseFM(text) {
  const m = text.match(/^---\n([\s\S]*?)\n---/);
  if (!m) return {};
  const obj = {};
  m[1].split('\n').forEach(line => {
    const i = line.indexOf(':');
    if (i < 0) return;
    const key = line.slice(0, i).trim();
    let val = line.slice(i+1).trim().replace(/^["']|["']$/g, '');
    val = val.replace(/&lt;/g,'<').replace(/&gt;/g,'>');
    if (val === 'true') val = true;
    else if (val === 'false') val = false;
    obj[key] = val;
  });
  return obj;
}

async function loadFolder(folder) {
  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${folder}`);
    if (!r.ok) return [];
    const files = await r.json();
    if (!Array.isArray(files)) return [];
    const items = await Promise.all(
      files.filter(f => f.name.endsWith('.md')).map(async f => {
        const r2 = await fetch(f.download_url);
        const text = await r2.text();
        return { ...parseFM(text), _filename: f.name };
      })
    );
    return items;
  } catch(e) { return []; }
}

async function init() {
  const [writings, characters, thoughts] = await Promise.all([
    loadFolder('_writings'),
    loadFolder('_characters'),
    loadFolder('_thoughts')
  ]);

  const wc = document.getElementById('writings-container');
  if (!writings.length) {
    wc.innerHTML = '<div style="padding:2rem;color:var(--mist);font-family:\'Cormorant Garamond\',serif;font-style:italic;grid-column:1/-1">暂无文章</div>';
  } else {
    wc.innerHTML = '';
    const sorted = [...writings].sort((a,b) => (b.featured?1:0)-(a.featured?1:0));
    sorted.forEach((w,i) => {
      const cls = i===0 ? 'w-card w-feat' : (i===1 ? 'w-card w-2' : 'w-card w-3');
      const link = `article.html?f=${encodeURIComponent(w._filename)}`;
      wc.innerHTML += `<div class="${cls}" onclick="location.href='${link}'">
        <div class="w-date">${w.date||''}</div>
        <h2 class="w-title">${w.title||''}</h2>
        <p class="w-excerpt">${w.excerpt||''}</p>
        <a href="${link}" class="w-more" onclick="event.stopPropagation()">继续读 →</a>
      </div>`;
    });
  }

  const cc = document.getElementById('characters-container');
  if (!characters.length) {
    cc.innerHTML = '<div style="padding:2rem;color:var(--mist);font-family:\'Cormorant Garamond\',serif;font-style:italic">暂无人物</div>';
  } else {
    cc.innerHTML = '';
    characters.forEach(c => {
      cc.innerHTML += `<div class="char-card ${c.style||'char-1'}"><div class="char-num">${c.number||''}</div><div class="char-tag">${c.tag||''}</div><div class="char-name">${c.name||''}</div><div class="char-name-en">${c.nameEn||''}</div><p class="char-desc">${c.desc||''}</p><div class="char-note">${c.note||''}</div></div>`;
    });
  }

  const tc = document.getElementById('thoughts-container');
  if (!thoughts.length) {
    tc.innerHTML = '<div style="padding:2rem;color:var(--mist);font-family:\'Cormorant Garamond\',serif;font-style:italic">暂无碎想</div>';
  } else {
    tc.innerHTML = '';
    thoughts.forEach((t,i) => {
      tc.innerHTML += `<div class="thought" style="border-left:3px solid ${thoughtColors[i%thoughtColors.length]}"><p class="thought-text">${t.text||''}</p><div class="thought-date">${t.date||''}</div></div>`;
    });
  }
}

init();

if(window.netlifyIdentity){
  window.netlifyIdentity.on('init', user => {
    if(!user){ window.netlifyIdentity.on('login', () => { document.location.href='/admin/'; }); }
  });
}
</script>
</body>
</html>
