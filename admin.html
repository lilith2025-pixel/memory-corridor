<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记忆回廊 · 编辑后台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5efe4; --bg2: #ede5d6; --bg3: #e8dfc8;
    --ink: #2a2118; --ink-lt: #5a4e40; --mist: #9a8e7e;
    --terra: #b85c38; --sage: #5a7a5e; --gold: #a07830;
    --dusty: #8a5a7a; --sky: #4a7090;
    --success: #5a7a5e; --danger: #b85c38;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--ink); font-family:'Noto Serif SC',serif; min-height:100vh; }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:var(--bg);
  }
  .setup-box {
    width:100%; max-width:480px; padding:3rem;
    background:var(--bg2); border:1px solid rgba(42,33,24,0.08);
    position:relative;
  }
  .setup-box::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:linear-gradient(90deg,var(--terra),var(--sage),var(--dusty),var(--gold));
  }
  .setup-title {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:2rem; margin-bottom:0.3rem; color:var(--ink);
  }
  .setup-sub { font-size:0.8rem; color:var(--mist); margin-bottom:2rem; line-height:1.7; }
  .setup-sub a { color:var(--terra); }
  .setup-label { font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--mist); margin-bottom:0.5rem; display:block; }
  .setup-input {
    width:100%; padding:0.75rem 1rem; background:var(--bg);
    border:1px solid rgba(42,33,24,0.15); color:var(--ink);
    font-family:'Noto Serif SC',serif; font-size:0.9rem; margin-bottom:1.5rem;
    outline:none; transition:border-color 0.2s;
  }
  .setup-input:focus { border-color:var(--terra); }
  .btn-primary {
    width:100%; padding:0.85rem; background:var(--terra); color:#f5efe4;
    border:none; cursor:pointer; font-family:'Noto Serif SC',serif; font-size:0.85rem;
    letter-spacing:0.1em; transition:background 0.2s;
  }
  .btn-primary:hover { background:#9a4828; }
  .setup-error { color:var(--danger); font-size:0.8rem; margin-top:1rem; display:none; }

  /* ── MAIN ADMIN ── */
  #admin-screen { display:none; }

  .topbar {
    background:var(--bg2); border-bottom:1px solid rgba(42,33,24,0.08);
    padding:1.2rem 2rem; display:flex; justify-content:space-between; align-items:center;
    position:sticky; top:0; z-index:100;
  }
  .topbar::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:linear-gradient(90deg,var(--terra),var(--sage),var(--dusty),var(--gold));
  }
  .topbar-title { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.3rem; }
  .topbar-actions { display:flex; gap:0.8rem; align-items:center; }
  .btn-save {
    padding:0.6rem 1.5rem; background:var(--terra); color:#f5efe4;
    border:none; cursor:pointer; font-family:'Noto Serif SC',serif; font-size:0.8rem;
    letter-spacing:0.1em; transition:background 0.2s;
  }
  .btn-save:hover { background:#9a4828; }
  .btn-save:disabled { background:var(--mist); cursor:not-allowed; }
  .btn-logout {
    padding:0.6rem 1rem; background:transparent; color:var(--mist);
    border:1px solid rgba(42,33,24,0.12); cursor:pointer; font-size:0.75rem;
    font-family:'Noto Serif SC',serif; transition:color 0.2s;
  }
  .btn-logout:hover { color:var(--ink); }

  .status-msg {
    padding:0.8rem 2rem; font-size:0.8rem; letter-spacing:0.1em;
    display:none; text-align:center;
  }
  .status-msg.success { background:rgba(90,122,94,0.1); color:var(--success); display:block; }
  .status-msg.error   { background:rgba(184,92,56,0.1); color:var(--danger); display:block; }
  .status-msg.loading { background:rgba(160,120,48,0.08); color:var(--gold); display:block; }

  .admin-body { max-width:900px; margin:0 auto; padding:3rem 2rem 6rem; }

  /* TABS */
  .tabs { display:flex; gap:0; border-bottom:2px solid rgba(42,33,24,0.08); margin-bottom:3rem; }
  .tab {
    padding:0.8rem 1.5rem; font-size:0.8rem; letter-spacing:0.12em; text-transform:uppercase;
    cursor:pointer; color:var(--mist); border-bottom:2px solid transparent;
    margin-bottom:-2px; transition:color 0.2s, border-color 0.2s; background:none; border-top:none; border-left:none; border-right:none;
    font-family:'Noto Serif SC',serif;
  }
  .tab.active { color:var(--terra); border-bottom-color:var(--terra); }

  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  /* FORM ELEMENTS */
  .field-group { margin-bottom:2.5rem; }
  .field-label {
    font-size:0.7rem; letter-spacing:0.18em; text-transform:uppercase;
    color:var(--mist); margin-bottom:0.5rem; display:block;
  }
  .field-input, .field-textarea {
    width:100%; padding:0.75rem 1rem; background:var(--bg2);
    border:1px solid rgba(42,33,24,0.12); color:var(--ink);
    font-family:'Noto Serif SC',serif; font-size:0.95rem;
    outline:none; transition:border-color 0.2s;
  }
  .field-input:focus, .field-textarea:focus { border-color:var(--terra); }
  .field-textarea { resize:vertical; min-height:100px; line-height:1.7; }
  .field-hint { font-size:0.72rem; color:var(--mist); margin-top:0.4rem; font-style:italic; font-family:'Cormorant Garamond',serif; }

  /* CARDS */
  .item-card {
    background:var(--bg2); border:1px solid rgba(42,33,24,0.08);
    padding:2rem; margin-bottom:1.5rem; position:relative;
  }
  .item-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  }
  .item-card:nth-child(1)::before { background:var(--terra); }
  .item-card:nth-child(2)::before { background:var(--sage); }
  .item-card:nth-child(3)::before { background:var(--dusty); }
  .item-card:nth-child(4)::before { background:var(--gold); }
  .item-card:nth-child(5)::before { background:var(--sky); }

  .item-header {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:1.5rem;
  }
  .item-title-label {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:1.1rem; color:var(--ink-lt);
  }
  .btn-remove {
    background:none; border:none; color:var(--mist); cursor:pointer;
    font-size:0.75rem; letter-spacing:0.1em; text-transform:uppercase;
    font-family:'Noto Serif SC',serif; transition:color 0.2s; padding:0.3rem 0.6rem;
  }
  .btn-remove:hover { color:var(--danger); }

  .btn-add {
    width:100%; padding:1rem; background:transparent;
    border:1px dashed rgba(42,33,24,0.2); color:var(--mist);
    cursor:pointer; font-family:'Noto Serif SC',serif; font-size:0.8rem;
    letter-spacing:0.12em; text-transform:uppercase; transition:all 0.2s; margin-top:0.5rem;
  }
  .btn-add:hover { border-color:var(--terra); color:var(--terra); background:rgba(184,92,56,0.03); }

  .view-site-link {
    display:inline-block; margin-top:0.5rem;
    font-size:0.75rem; color:var(--sky); text-decoration:none; letter-spacing:0.1em;
  }
  .view-site-link:hover { text-decoration:underline; }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="setup-box">
    <h1 class="setup-title">记忆回廊后台</h1>
    <p class="setup-sub">
      首次使用需要输入你的 GitHub Token。<br>
      获取方式：GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic) → 勾选 <strong>repo</strong> 权限。<br>
      Token 只存在你自己的浏览器里，不会上传到任何地方。
    </p>
    <label class="setup-label">GitHub Token</label>
    <input type="password" class="setup-input" id="token-input" placeholder="ghp_xxxxxxxxxxxxxxxx">
    <button class="btn-primary" onclick="initAdmin()">进入后台</button>
    <div class="setup-error" id="setup-error"></div>
  </div>
</div>

<!-- ADMIN SCREEN -->
<div id="admin-screen">
  <div class="topbar">
    <div>
      <span class="topbar-title">记忆回廊 · 编辑后台</span>
      <a class="view-site-link" id="site-link" href="#" target="_blank">↗ 查看网站</a>
    </div>
    <div class="topbar-actions">
      <button class="btn-save" id="save-btn" onclick="saveContent()">保存并发布</button>
      <button class="btn-logout" onclick="logout()">退出</button>
    </div>
  </div>

  <div class="status-msg" id="status-msg"></div>

  <div class="admin-body">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('writings')">文字</button>
      <button class="tab" onclick="switchTab('characters')">人物</button>
      <button class="tab" onclick="switchTab('thoughts')">碎想</button>
    </div>

    <!-- WRITINGS -->
    <div class="tab-panel active" id="tab-writings">
      <div id="writings-list"></div>
      <button class="btn-add" onclick="addWriting()">+ 新增一篇文章</button>
    </div>

    <!-- CHARACTERS -->
    <div class="tab-panel" id="tab-characters">
      <div id="characters-list"></div>
      <button class="btn-add" onclick="addCharacter()">+ 新增人物</button>
    </div>

    <!-- THOUGHTS -->
    <div class="tab-panel" id="tab-thoughts">
      <div id="thoughts-list"></div>
      <button class="btn-add" onclick="addThought()">+ 新增碎想</button>
    </div>
  </div>
</div>

<script>
const REPO = 'lilith2025-pixel/memory-corridor';
const FILE = 'content.json';
let token = '';
let fileSha = '';
let content = {};

// ── SETUP ──
async function initAdmin() {
  const t = document.getElementById('token-input').value.trim();
  if (!t) return showSetupError('请输入 Token');
  token = t;
  try {
    await loadContent();
    localStorage.setItem('mc_token', token);
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    document.getElementById('site-link').href = `https://${REPO.split('/')[0]}.github.io/${REPO.split('/')[1]}`;
    renderAll();
  } catch(e) {
    showSetupError('Token 无效或无权限，请检查后重试');
  }
}

function showSetupError(msg) {
  const el = document.getElementById('setup-error');
  el.textContent = msg; el.style.display = 'block';
}

function logout() {
  localStorage.removeItem('mc_token');
  location.reload();
}

// ── GITHUB API ──
async function loadContent() {
  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
  });
  if (!res.ok) throw new Error('load failed');
  const data = await res.json();
  fileSha = data.sha;
  content = JSON.parse(atob(data.content.replace(/\n/g,'')));
}

async function saveContent() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  showStatus('正在保存并发布…', 'loading');
  try {
    collectFormData();
    const body = JSON.stringify(content, null, 2);
    const encoded = btoa(unescape(encodeURIComponent(body)));
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: '更新内容', content: encoded, sha: fileSha })
    });
    if (!res.ok) throw new Error('save failed');
    const data = await res.json();
    fileSha = data.content.sha;
    showStatus('✓ 保存成功，网站将在约1分钟后更新', 'success');
  } catch(e) {
    showStatus('保存失败，请重试', 'error');
  }
  btn.disabled = false;
}

function showStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = `status-msg ${type}`;
  if (type !== 'loading') setTimeout(() => { el.className = 'status-msg'; }, 4000);
}

// ── TABS ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}

// ── COLLECT FORM DATA ──
function collectFormData() {
  // Writings
  content.writings = [];
  document.querySelectorAll('.writing-item').forEach(el => {
    content.writings.push({
      date:     el.querySelector('.f-date').value,
      title:    el.querySelector('.f-title').value,
      excerpt:  el.querySelector('.f-excerpt').value,
      featured: el.dataset.featured === 'true'
    });
  });
  // Characters
  content.characters = [];
  document.querySelectorAll('.character-item').forEach(el => {
    content.characters.push({
      number: el.querySelector('.f-number').value,
      tag:    el.querySelector('.f-tag').value,
      name:   el.querySelector('.f-name').value,
      nameEn: el.querySelector('.f-nameEn').value,
      desc:   el.querySelector('.f-desc').value,
      note:   el.querySelector('.f-note').value,
      style:  el.querySelector('.f-style').value
    });
  });
  // Thoughts
  content.thoughts = [];
  document.querySelectorAll('.thought-item').forEach(el => {
    content.thoughts.push({
      text: el.querySelector('.f-text').value,
      date: el.querySelector('.f-date').value
    });
  });
}

// ── RENDER ──
function renderAll() {
  renderWritings(); renderCharacters(); renderThoughts();
}

function renderWritings() {
  const el = document.getElementById('writings-list');
  el.innerHTML = '';
  content.writings.forEach((w, i) => {
    el.appendChild(makeWritingCard(w, i));
  });
}

function makeWritingCard(w, i) {
  const div = document.createElement('div');
  div.className = 'item-card writing-item';
  div.dataset.featured = w.featured ? 'true' : 'false';
  div.innerHTML = `
    <div class="item-header">
      <span class="item-title-label">文章 ${i+1}${w.featured ? ' · 置顶' : ''}</span>
      <button class="btn-remove" onclick="removeItem('writings', this)">删除</button>
    </div>
    <div class="field-group">
      <label class="field-label">日期标签</label>
      <input class="field-input f-date" value="${w.date}" placeholder="例：2025 · 春">
      <div class="field-hint">显示在标题上方的小字</div>
    </div>
    <div class="field-group">
      <label class="field-label">标题</label>
      <input class="field-input f-title" value="${escHtml(w.title)}">
    </div>
    <div class="field-group">
      <label class="field-label">摘要</label>
      <textarea class="field-textarea f-excerpt">${escHtml(w.excerpt)}</textarea>
      <div class="field-hint">显示在首页的预览文字</div>
    </div>
  `;
  return div;
}

function renderCharacters() {
  const el = document.getElementById('characters-list');
  el.innerHTML = '';
  content.characters.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'item-card character-item';
    div.innerHTML = `
      <div class="item-header">
        <span class="item-title-label">人物 · ${c.name}</span>
        <button class="btn-remove" onclick="removeItem('characters', this)">删除</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="field-group">
          <label class="field-label">中文名</label>
          <input class="field-input f-name" value="${c.name}">
        </div>
        <div class="field-group">
          <label class="field-label">英文名</label>
          <input class="field-input f-nameEn" value="${c.nameEn}">
        </div>
        <div class="field-group">
          <label class="field-label">序号</label>
          <input class="field-input f-number" value="${c.number}" placeholder="一">
        </div>
        <div class="field-group">
          <label class="field-label">标签</label>
          <input class="field-input f-tag" value="${c.tag}">
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">人物简介</label>
        <textarea class="field-textarea f-desc">${escHtml(c.desc)}</textarea>
      </div>
      <div class="field-group">
        <label class="field-label">底部注释</label>
        <input class="field-input f-note" value="${escHtml(c.note)}">
      </div>
      <input type="hidden" class="f-style" value="${c.style}">
    `;
    el.appendChild(div);
  });
}

function renderThoughts() {
  const el = document.getElementById('thoughts-list');
  el.innerHTML = '';
  content.thoughts.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'item-card thought-item';
    div.innerHTML = `
      <div class="item-header">
        <span class="item-title-label">碎想 ${i+1}</span>
        <button class="btn-remove" onclick="removeItem('thoughts', this)">删除</button>
      </div>
      <div class="field-group">
        <label class="field-label">内容</label>
        <textarea class="field-textarea f-text">${escHtml(t.text)}</textarea>
        <div class="field-hint">可以用 &lt;em&gt;文字&lt;/em&gt; 来给词加颜色强调</div>
      </div>
      <div class="field-group">
        <label class="field-label">日期</label>
        <input class="field-input f-date" value="${t.date}" placeholder="2025.06">
      </div>
    `;
    el.appendChild(div);
  });
}

// ── ADD / REMOVE ──
function addWriting() {
  content.writings.push({ date: '', title: '', excerpt: '', featured: false });
  renderWritings();
  document.querySelectorAll('.writing-item').forEach(el => el.lastElementChild && el.scrollIntoView && null);
  document.getElementById('writings-list').lastElementChild.scrollIntoView({ behavior:'smooth' });
}

function addCharacter() {
  const n = content.characters.length + 1;
  const nums = ['一','二','三','四','五'];
  content.characters.push({ number: nums[n-1]||String(n), tag:'', name:'', nameEn:'', desc:'', note:'', style:`char-${n}` });
  renderCharacters();
  document.getElementById('characters-list').lastElementChild.scrollIntoView({ behavior:'smooth' });
}

function addThought() {
  content.thoughts.push({ text: '', date: '' });
  renderThoughts();
  document.getElementById('thoughts-list').lastElementChild.scrollIntoView({ behavior:'smooth' });
}

function removeItem(type, btn) {
  const card = btn.closest('.item-card');
  const list = card.parentElement;
  const idx = Array.from(list.children).indexOf(card);
  if (!confirm('确定删除吗？')) return;
  content[type].splice(idx, 1);
  if (type === 'writings') renderWritings();
  else if (type === 'characters') renderCharacters();
  else renderThoughts();
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── AUTO LOGIN ──
window.onload = () => {
  const saved = localStorage.getItem('mc_token');
  if (saved) {
    document.getElementById('token-input').value = saved;
    initAdmin();
  }
};
</script>
</body>
</html>
