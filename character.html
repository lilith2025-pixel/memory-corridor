<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记忆回廊 · 人物</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5efe4;--bg2:#ede5d6;--bg3:#e8dfc8;--ink:#2a2118;--ink-lt:#5a4e40;--mist:#9a8e7e;
    --terra:#b85c38;--terra-lt:#d4805e;--sage:#5a7a5e;--sage-lt:#82a886;
    --dusty:#8a5a7a;--dusty-lt:#b07fa0;--gold:#a07830;--gold-lt:#c49a50;
    --sky:#4a7090;--sky-lt:#6a94b4;
    --m:clamp(1.5rem,5vw,4rem);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--ink);font-family:'Noto Serif SC',serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.028'/%3E%3C/svg%3E");
    pointer-events:none;z-index:9999;}

  /* ── TOPBAR ── */
  .topbar{padding:1.2rem var(--m);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(42,33,24,0.08);background:var(--bg);position:sticky;top:0;z-index:50;}
  .topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--terra),var(--sage),var(--dusty),var(--gold));}
  .back-link{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.9rem;color:var(--mist);text-decoration:none;transition:color 0.2s;}
  .back-link:hover{color:var(--sage);}

  /* ── DOSSIER LAYOUT ── */
  .dossier{max-width:800px;margin:0 auto;padding:3rem var(--m) 6rem;}

  /* Header */
  .dossier-header{display:grid;grid-template-columns:1fr auto;gap:2.5rem;align-items:start;margin-bottom:3rem;padding-bottom:3rem;border-bottom:1px solid rgba(42,33,24,0.08);}
  .dossier-header-text{min-width:0;}
  .dossier-number{font-family:'Playfair Display',serif;font-style:italic;font-weight:900;font-size:4rem;line-height:1;color:rgba(42,33,24,0.06);margin-bottom:0.3rem;user-select:none;}
  .dossier-tag{display:inline-block;font-size:0.6rem;letter-spacing:0.22em;text-transform:uppercase;padding:0.25em 0.9em;border-radius:2px;margin-bottom:1.2rem;}
  .dossier-tag.tag-gold{background:rgba(160,120,48,0.15);color:var(--gold);}
  .dossier-tag.tag-dusty{background:rgba(138,90,122,0.15);color:var(--dusty);}
  .dossier-tag.tag-terra{background:rgba(184,92,56,0.15);color:var(--terra);}
  .dossier-tag.tag-sage{background:rgba(90,122,94,0.15);color:var(--sage);}
  .dossier-tag.tag-sky{background:rgba(74,112,144,0.15);color:var(--sky);}
  .dossier-name a:hover{color:var(--terra);}
  .dossier-name{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,6vw,4rem);font-weight:900;line-height:1;color:var(--ink);margin-bottom:0.3rem;}
  .dossier-name-en{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;letter-spacing:0.12em;margin-bottom:1.2rem;}
  .dossier-identity{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.05rem;color:var(--ink-lt);line-height:1.8;border-left:2px solid var(--gold-lt);padding-left:1rem;}

  /* Photo */
  .dossier-photo{width:clamp(140px,18vw,200px);height:clamp(180px,23vw,260px);background:var(--bg2);border:1px solid rgba(42,33,24,0.08);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
  .dossier-photo img{width:100%;height:100%;object-fit:cover;}
  .dossier-photo-placeholder{font-family:'Playfair Display',serif;font-style:italic;font-size:3rem;color:rgba(42,33,24,0.08);user-select:none;}

  /* Info grid */
  .dossier-info{display:grid;grid-template-columns:auto 1fr;gap:0.4rem 1.5rem;margin-bottom:3rem;font-size:0.85rem;}
  .dossier-info dt{color:var(--mist);font-family:'Cormorant Garamond',serif;font-style:italic;letter-spacing:0.1em;padding:0.35rem 0;}
  .dossier-info dd{color:var(--ink-lt);padding:0.35rem 0;}

  /* Section label */
  .dossier-sec{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.78rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--mist);margin:3rem 0 1.5rem;display:flex;align-items:center;gap:0.8rem;}
  .dossier-sec::after{content:'';flex:1;height:1px;background:rgba(42,33,24,0.1);}

  /* Body text */
  .dossier-body{font-size:0.95rem;line-height:2;color:var(--ink-lt);}
  .dossier-body p{margin-bottom:1.3em;}
  .dossier-body h2{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;margin:2.5rem 0 1rem;color:var(--ink);padding-bottom:0.5rem;border-bottom:1px solid rgba(42,33,24,0.06);}
  .dossier-body h3{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-style:italic;margin:2rem 0 0.8rem;color:var(--ink);}
  .dossier-body blockquote{border-left:3px solid var(--gold-lt);padding:0.5em 1.2em;margin:1.5em 0;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.05rem;color:var(--mist);}
  .dossier-body strong{font-weight:600;color:var(--ink);}
  .dossier-body em{font-style:italic;color:var(--terra);}
  .dossier-body hr{border:none;height:1px;background:rgba(42,33,24,0.08);margin:2em 0;}
  .dossier-body ul,.dossier-body ol{margin:1em 0 1em 1.5em;color:var(--ink-lt);}
  .dossier-body li{margin-bottom:0.5em;line-height:1.8;}
  .dossier-body img{max-width:100%;margin:1.5em 0;border:1px solid rgba(42,33,24,0.06);}

  /* Related docs */
  .related-list{list-style:none;padding:0;}
  .related-item{display:flex;align-items:center;gap:0.8rem;padding:1rem 0;border-bottom:1px solid rgba(42,33,24,0.06);transition:padding-left 0.2s;}
  .related-item:hover{padding-left:0.5rem;}
  .related-item:last-child{border-bottom:none;}
  .related-pip{width:24px;height:2px;background:var(--terra);flex-shrink:0;}
  .related-link{text-decoration:none;color:var(--ink);font-size:0.9rem;transition:color 0.2s;}
  .related-link:hover{color:var(--terra);}
  .related-link .related-hint{display:block;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.78rem;color:var(--mist);margin-top:0.2rem;}

  /* Note */
  .dossier-note{margin-top:3rem;padding:2rem;background:var(--bg2);border-left:3px solid var(--gold-lt);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.95rem;color:var(--mist);line-height:1.8;}

  /* Loading */
  .loading{padding:6rem 2rem;text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--mist);font-size:1.2rem;}

  @media(max-width:600px){
    .dossier-header{grid-template-columns:1fr;text-align:center;}
    .dossier-photo{margin:0 auto 1.5rem;width:120px;height:155px;}
    .dossier-identity{border-left:none;padding-left:0;text-align:center;}
    .dossier-info{grid-template-columns:1fr;gap:0;}
    .dossier-info dt{padding-bottom:0;}
    .dossier-info dd{margin-bottom:0.5rem;}
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html#characters" class="back-link">← 回到人物</a>
</div>

<div class="dossier" id="dossier">
  <div class="loading" id="loading">正在打开档案…</div>
  <div id="dossier-content" style="display:none">

    <div class="dossier-header">
      <div class="dossier-header-text">
        <div class="dossier-number" id="d-number"></div>
        <div class="dossier-tag" id="d-tag"></div>
        <h1 class="dossier-name"><a href="index.html#characters" id="d-name" style="color:inherit;text-decoration:none;transition:color 0.2s;"></a></h1>
        <div class="dossier-name-en" id="d-name-en"></div>
        <div class="dossier-identity" id="d-identity"></div>
      </div>
      <div class="dossier-photo" id="d-photo">
        <span class="dossier-photo-placeholder" id="d-photo-placeholder"></span>
      </div>
    </div>

    <dl class="dossier-info" id="d-info" style="display:none"></dl>

    <div id="d-body-wrap" style="display:none">
      <div class="dossier-sec">人物档案 · Dossier</div>
      <div class="dossier-body" id="d-body"></div>
    </div>

    <div id="d-related-wrap" style="display:none">
      <div class="dossier-sec">延伸阅读 · Further Reading</div>
      <ul class="related-list" id="d-related"></ul>
    </div>

    <div class="dossier-note" id="d-note" style="display:none"></div>

  </div>
</div>

<script>
const REPO = 'lilith2025-pixel/memory-corridor';

function parseFM(text) {
  const m = text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  if (!m) return { _body: text };
  const obj = { _body: m[2].trim() };
  m[1].split('\n').forEach(line => {
    const i = line.indexOf(':');
    if (i < 0) return;
    const key = line.slice(0, i).trim();
    let val = line.slice(i+1).trim().replace(/^["']|["']$/g, '');
    val = val.replace(/&lt;/g,'<').replace(/&gt;/g,'>');
    if (val === 'true') val = true;
    else if (val === 'false') val = false;
    obj[key] = val;
  });
  return obj;
}

function mdToHtml(md) {
  if (!md) return '';
  let html = md;
  // h3 before h2 (longer match first)
  html = html.replace(/^###\s*(.+)$/gm, '<h3>$1</h3>');
  // h2
  html = html.replace(/^##\s*(.+)$/gm, '<h2>$1</h2>');
  // blockquote (consecutive lines merged)
  html = html.replace(/^>\s*(.+)$/gm, '<blockquote>$1</blockquote>');
  html = html.replace(/<\/blockquote>\n<blockquote>/g, '<br>');
  // bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // images
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
  // links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" style="color:var(--terra);text-decoration:underline;">$1</a>');
  // hr
  html = html.replace(/^-{3,}$/gm, '<hr>');
  // ul
  html = html.replace(/^[*-]\s+(.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.+<\/li>\n?)+)/g, '<ul>$1</ul>');
  // paragraphs — split by double newline
  html = html.split('\n\n').map(block => {
    block = block.trim();
    if (!block) return '';
    if (block.startsWith('<h2') || block.startsWith('<h3') || block.startsWith('<blockquote') || block.startsWith('<hr') || block.startsWith('<ul') || block.startsWith('<img')) return block;
    return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
  return html;
}

// Map style names to tag color classes
const tagClassMap = {
  'char-1': 'tag-gold',
  'char-2': 'tag-dusty',
  'char-terra': 'tag-terra',
  'char-sage': 'tag-sage',
  'char-sky': 'tag-sky',
};
// Map style names to accent colors for name-en
const accentMap = {
  'char-1': 'var(--gold)',
  'char-2': 'var(--dusty)',
  'char-terra': 'var(--terra)',
  'char-sage': 'var(--sage)',
  'char-sky': 'var(--sky)',
};

async function loadCharacter() {
  const params = new URLSearchParams(location.search);
  const filename = params.get('f');
  if (!filename) { document.getElementById('loading').textContent = '找不到人物'; return; }

  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/_characters/${filename}`);
    if (!r.ok) throw new Error();
    const data = await r.json();
    const raw = atob(data.content.replace(/\n/g, ''));
    const decoded = decodeURIComponent(escape(raw));
    const ch = parseFM(decoded);

    document.title = (ch.name || '人物') + ' · 记忆回廊';

    // Number
    const numEl = document.getElementById('d-number');
    if (ch.number) { numEl.textContent = ch.number; } else { numEl.style.display = 'none'; }

    // Tag
    const tagEl = document.getElementById('d-tag');
    if (ch.tag) {
      tagEl.textContent = ch.tag;
      tagEl.classList.add(tagClassMap[ch.style] || 'tag-gold');
    } else { tagEl.style.display = 'none'; }

    // Name
    document.getElementById('d-name').textContent = ch.name || '';

    // English name
    const enEl = document.getElementById('d-name-en');
    if (ch.nameEn) {
      enEl.textContent = ch.nameEn;
      enEl.style.color = accentMap[ch.style] || 'var(--gold)';
    } else { enEl.style.display = 'none'; }

    // Identity
    const idEl = document.getElementById('d-identity');
    if (ch.identity) {
      idEl.textContent = ch.identity;
      idEl.style.borderLeftColor = accentMap[ch.style] || 'var(--gold-lt)';
    } else { idEl.style.display = 'none'; }

    // Photo
    const photoWrap = document.getElementById('d-photo');
    const photoPlaceholder = document.getElementById('d-photo-placeholder');
    if (ch.photo) {
      photoPlaceholder.style.display = 'none';
      const img = document.createElement('img');
      img.src = ch.photo;
      img.alt = ch.name || '';
      photoWrap.appendChild(img);
    } else {
      // Show first character of name as placeholder
      photoPlaceholder.textContent = (ch.name || '?')[0];
    }

    // Info fields
    const infoEl = document.getElementById('d-info');
    const infoFields = [];
    if (ch.age) infoFields.push(['年龄', ch.age]);
    if (ch.origin) infoFields.push(['出身', ch.origin]);
    if (ch.occupation) infoFields.push(['职业', ch.occupation]);
    if (ch.personality) infoFields.push(['性格', ch.personality]);
    if (ch.status) infoFields.push(['状态', ch.status]);
    if (infoFields.length) {
      infoEl.style.display = 'grid';
      infoEl.innerHTML = infoFields.map(([k,v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('');
    }

    // Body (markdown → html)
    if (ch._body) {
      document.getElementById('d-body-wrap').style.display = 'block';
      document.getElementById('d-body').innerHTML = mdToHtml(ch._body);
    }

    // Related docs
    if (ch.related_docs) {
      const docs = ch.related_docs.split(',').map(s => s.trim()).filter(Boolean);
      if (docs.length) {
        document.getElementById('d-related-wrap').style.display = 'block';
        const relEl = document.getElementById('d-related');

        // Try to load each related doc's title from frontmatter
        for (const docFile of docs) {
          try {
            const dr = await fetch(`https://api.github.com/repos/${REPO}/contents/_writings/${docFile}`);
            if (!dr.ok) throw new Error();
            const dd = await dr.json();
            const dt = atob(dd.content.replace(/\n/g, ''));
            const ddec = decodeURIComponent(escape(dt));
            const docMeta = parseFM(ddec);
            relEl.innerHTML += `<li class="related-item">
              <span class="related-pip"></span>
              <a href="article.html?f=${encodeURIComponent(docFile)}" class="related-link">
                ${docMeta.title || docFile}
                ${docMeta.excerpt ? '<span class="related-hint">' + docMeta.excerpt.slice(0, 60) + '…</span>' : ''}
              </a>
            </li>`;
          } catch(e) {
            // If can't load, still show the link
            relEl.innerHTML += `<li class="related-item">
              <span class="related-pip"></span>
              <a href="article.html?f=${encodeURIComponent(docFile)}" class="related-link">${docFile.replace('.md','')}</a>
            </li>`;
          }
        }
      }
    }

    // Note
    if (ch.note) {
      const noteEl = document.getElementById('d-note');
      noteEl.style.display = 'block';
      noteEl.innerHTML = ch.note;
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('dossier-content').style.display = 'block';

  } catch(e) {
    document.getElementById('loading').textContent = '加载失败，请返回重试。';
  }
}

loadCharacter();
</script>
</body>
</html>
