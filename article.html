<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记忆回廊 · 文字</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5efe4;--bg2:#ede5d6;--ink:#2a2118;--ink-lt:#5a4e40;--mist:#9a8e7e;
    --terra:#b85c38;--sage:#5a7a5e;--gold:#a07830;--dusty:#8a5a7a;--sky:#4a7090;
    --m:clamp(1.5rem,5vw,4rem);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--ink);font-family:'Noto Serif SC',serif;min-height:100vh;}

  /* ── TOPBAR ── */
  .topbar{padding:1.2rem var(--m);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(42,33,24,0.08);background:var(--bg);position:sticky;top:0;z-index:50;}
  .topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--terra),var(--sage),var(--dusty),var(--gold));}
  .back-link{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.9rem;color:var(--mist);text-decoration:none;transition:color 0.2s;}
  .back-link:hover{color:var(--terra);}
  .theme-picker{display:flex;gap:0.5rem;align-items:center;}
  .theme-label{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--mist);margin-right:0.3rem;}
  .theme-btn{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform 0.2s,border-color 0.2s;font-size:0.7rem;display:flex;align-items:center;justify-content:center;}
  .theme-btn:hover{transform:scale(1.2);}
  .theme-btn.active{border-color:var(--ink);}

  /* ── ARTICLE WRAPPER ── */
  .article-outer{max-width:720px;margin:4rem auto;padding:0 var(--m) 6rem;}

  /* ── PAPER ── */
  .paper{position:relative;padding:4rem 4rem 5rem;min-height:60vh;overflow:hidden;
    box-shadow:0 1px 1px rgba(0,0,0,0.04),0 2px 4px rgba(0,0,0,0.035),0 4px 8px rgba(0,0,0,0.03),0 8px 20px rgba(0,0,0,0.025),3px 5px 12px rgba(0,0,0,0.02),-2px 3px 8px rgba(0,0,0,0.015);}
  .paper-edge{position:absolute;inset:0;pointer-events:none;z-index:1;}
  .paper-grain{position:absolute;inset:0;pointer-events:none;z-index:2;mix-blend-mode:multiply;}
  .paper::after{content:'';position:absolute;bottom:0;right:0;width:60px;height:60px;pointer-events:none;z-index:3;background:linear-gradient(135deg,transparent 55%,rgba(0,0,0,0.015) 70%,rgba(0,0,0,0.03) 100%);}
  .paper-extra{position:absolute;inset:0;pointer-events:none;z-index:3;}
  .deco{position:absolute;inset:0;pointer-events:none;z-index:4;overflow:hidden;}
  .deco svg{position:absolute;}
  .deco-blur{filter:blur(3px);}
  #article-content,.loading{position:relative;z-index:10;}

  /* Theme deco visibility */
  .deco-sunny,.deco-rain,.deco-spring,.deco-autumn,.deco-night,.deco-snow{display:none;}
  .theme-sunny .deco-sunny,.theme-rain .deco-rain,.theme-spring .deco-spring,
  .theme-autumn .deco-autumn,.theme-night .deco-night,.theme-snow .deco-snow{display:block;}

  /* ── THEMES ── */

  /* ☀ 晴 sunny */
  .theme-sunny .paper{background:linear-gradient(175deg,#fdf8ee 0%,#f7f0e0 45%,#f3ebd7 100%);}
  .theme-sunny .paper-edge{box-shadow:inset 0 0 50px rgba(140,100,40,0.05),inset 0 0 100px rgba(100,70,20,0.02);}
  .theme-sunny .paper-grain{opacity:0.2;filter:url(#grain);}
  .theme-sunny .paper-extra{background-image:repeating-linear-gradient(transparent,transparent 28px,rgba(160,120,48,0.04) 28px,rgba(160,120,48,0.04) 28.5px);background-position:0 50px;}
  .theme-sunny .article-date{color:#b8a888;}
  .theme-sunny .article-title{color:#3a2e22;}
  .theme-sunny .article-divider{background:linear-gradient(90deg,#a07830,transparent);}
  .theme-sunny .article-body{color:#4a3e30;}
  .theme-sunny .article-body p:first-of-type::first-letter{color:#a07830;}

  /* 🌧 雨 rain */
  .theme-rain .paper{background:radial-gradient(ellipse 130% 80% at 25% 15%,rgba(74,112,144,0.045) 0%,transparent 65%),radial-gradient(ellipse 100% 70% at 78% 80%,rgba(74,112,144,0.05) 0%,transparent 65%),linear-gradient(175deg,#eff3f7 0%,#e8edf3 50%,#eaeff5 100%);}
  .theme-rain .paper-edge{box-shadow:inset 0 0 60px rgba(74,112,144,0.04),inset 0 0 120px rgba(50,70,90,0.015);}
  .theme-rain .paper-grain{opacity:0.16;filter:url(#grain);}
  .theme-rain .paper-extra{background:radial-gradient(ellipse 350px 250px at 8% 90%,rgba(74,112,144,0.05) 0%,transparent 70%),radial-gradient(ellipse 300px 400px at 95% 8%,rgba(74,112,144,0.035) 0%,transparent 70%);filter:blur(8px);}
  .theme-rain .article-date{color:#8aa0b4;}
  .theme-rain .article-title{color:#2a2e33;}
  .theme-rain .article-divider{background:linear-gradient(90deg,#4a7090,transparent);}
  .theme-rain .article-body{color:#3e4650;}
  .theme-rain .article-body p:first-of-type::first-letter{color:#4a7090;}

  /* 🌸 春 spring */
  .theme-spring .paper{background:radial-gradient(ellipse 200px 220px at 10% 15%,rgba(138,90,122,0.03) 0%,transparent 70%),radial-gradient(ellipse 180px 260px at 90% 80%,rgba(90,122,94,0.04) 0%,transparent 70%),linear-gradient(162deg,#f4f8f1 0%,#eef5ec 45%,#f0f6ed 100%);}
  .theme-spring .paper-edge{box-shadow:inset 0 0 50px rgba(90,122,94,0.035),inset 0 0 90px rgba(60,80,50,0.015);}
  .theme-spring .paper-grain{opacity:0.14;filter:url(#grain);}
  .theme-spring .article-date{color:#8aa48c;}
  .theme-spring .article-title{color:#2e3328;}
  .theme-spring .article-divider{background:linear-gradient(90deg,#8a5a7a,transparent);}
  .theme-spring .article-body{color:#3e4438;}
  .theme-spring .article-body p:first-of-type::first-letter{color:#8a5a7a;}

  /* 🍂 秋 autumn */
  .theme-autumn .paper{background:radial-gradient(ellipse 220px 200px at 3% 3%,rgba(90,50,10,0.07) 0%,transparent 70%),radial-gradient(ellipse 200px 260px at 97% 97%,rgba(90,50,10,0.08) 0%,transparent 70%),radial-gradient(ellipse 280px 180px at 94% 6%,rgba(80,45,10,0.04) 0%,transparent 70%),linear-gradient(165deg,#f4ebdd 0%,#efe3d0 35%,#ecdcca 70%,#efe2d2 100%);}
  .theme-autumn .paper-edge{box-shadow:inset 0 0 70px rgba(90,50,10,0.06),inset 0 0 130px rgba(60,30,5,0.025);}
  .theme-autumn .paper-grain{opacity:0.3;filter:url(#grain);}
  .theme-autumn .article-date{color:#b89878;}
  .theme-autumn .article-title{color:#2d231a;}
  .theme-autumn .article-divider{background:linear-gradient(90deg,#b85c38,transparent);}
  .theme-autumn .article-body{color:#3e3226;}
  .theme-autumn .article-body p:first-of-type::first-letter{color:#b85c38;}

  /* 🌙 夜 night */
  .theme-night .paper{background:radial-gradient(ellipse 55% 45% at 50% 35%,rgba(40,35,65,1) 0%,rgba(22,20,36,1) 100%),linear-gradient(170deg,#1d1a30 0%,#191726 50%,#1b1930 100%);
    box-shadow:0 1px 2px rgba(0,0,0,0.12),0 3px 6px rgba(0,0,0,0.1),0 6px 16px rgba(0,0,0,0.08),0 12px 32px rgba(0,0,0,0.06),inset 0 0 60px rgba(0,0,0,0.1);}
  .theme-night .paper-edge{box-shadow:inset 0 0 80px rgba(0,0,0,0.12);}
  .theme-night .paper-grain{opacity:0.08;filter:url(#grain);mix-blend-mode:screen;}
  .theme-night .paper-extra{background:radial-gradient(ellipse 55% 50% at 48% 32%,rgba(255,200,120,0.025) 0%,transparent 70%);}
  .theme-night .paper::after{background:linear-gradient(135deg,transparent 55%,rgba(0,0,0,0.04) 70%,rgba(0,0,0,0.06) 100%);}
  .theme-night .article-date{color:rgba(200,190,210,0.35);}
  .theme-night .article-title{color:#e4dcd0;}
  .theme-night .article-divider{background:linear-gradient(90deg,rgba(180,165,220,0.3),transparent);}
  .theme-night .article-body{color:#b8b0a6;}
  .theme-night .article-body h1,.theme-night .article-body h2,.theme-night .article-body h3{color:#e8e0d4;}
  .theme-night .article-body p:first-of-type::first-letter{color:rgba(180,165,220,0.6);}

  /* ❄ 雪 snow */
  .theme-snow .paper{background:radial-gradient(ellipse 200px 200px at 12% 18%,rgba(74,112,144,0.03) 0%,transparent 70%),radial-gradient(ellipse 220px 180px at 85% 75%,rgba(74,112,144,0.04) 0%,transparent 70%),radial-gradient(ellipse 70% 50% at 50% 45%,rgba(248,250,255,0.5) 0%,transparent 70%),linear-gradient(170deg,#f4f7fc 0%,#eef3fa 45%,#f1f5fb 100%);}
  .theme-snow .paper-edge{box-shadow:inset 0 0 45px rgba(74,112,144,0.025),inset 0 0 90px rgba(50,70,100,0.01);}
  .theme-snow .paper-grain{opacity:0.1;filter:url(#grain);}
  .theme-snow .paper-extra{background-image:radial-gradient(circle 1.5px at 8% 12%,rgba(255,255,255,0.7) 0%,transparent 100%),radial-gradient(circle 1px at 22% 28%,rgba(255,255,255,0.5) 0%,transparent 100%),radial-gradient(circle 2px at 78% 8%,rgba(255,255,255,0.6) 0%,transparent 100%),radial-gradient(circle 1px at 42% 55%,rgba(255,255,255,0.4) 0%,transparent 100%),radial-gradient(circle 1.5px at 90% 42%,rgba(255,255,255,0.5) 0%,transparent 100%),radial-gradient(circle 1px at 15% 70%,rgba(255,255,255,0.6) 0%,transparent 100%),radial-gradient(circle 2px at 65% 85%,rgba(255,255,255,0.5) 0%,transparent 100%),radial-gradient(circle 1px at 35% 92%,rgba(255,255,255,0.4) 0%,transparent 100%);}
  .theme-snow .article-date{color:#8aa0b8;}
  .theme-snow .article-title{color:#2e3540;}
  .theme-snow .article-divider{background:linear-gradient(90deg,#4a7090,transparent);}
  .theme-snow .article-body{color:#3a4250;}
  .theme-snow .article-body p:first-of-type::first-letter{color:#4a7090;}

  /* ── ARTICLE CONTENT ── */
  .article-date{font-size:0.68rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--mist);margin-bottom:1.5rem;font-family:'Cormorant Garamond',serif;font-style:italic;}
  .article-title{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;line-height:1.2;margin-bottom:2.5rem;color:var(--ink);}
  .article-divider{height:1px;background:linear-gradient(90deg,var(--terra),transparent);margin-bottom:2.5rem;opacity:0.4;}
  .article-body{font-family:'Noto Serif SC',serif;font-size:1rem;line-height:2;color:var(--ink-lt);}
  .article-body p{margin-bottom:1.5em;}
  .article-body p:first-of-type::first-letter{float:left;font-family:'Playfair Display',serif;font-size:3.4em;line-height:0.78;padding-right:0.06em;margin-top:0.06em;font-weight:900;color:var(--terra);}
  .article-body h1{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;margin:2em 0 0.8em;color:var(--ink);}
  .article-body h2{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin:1.8em 0 0.7em;color:var(--ink);}
  .article-body h3{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-style:italic;margin:1.5em 0 0.6em;color:var(--ink);}
  .article-body blockquote{border-left:3px solid var(--terra);padding:0.5em 1.5em;margin:1.5em 0;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:var(--mist);}
  .article-body hr{border:none;height:1px;background:rgba(42,33,24,0.12);margin:2em 0;}
  .article-body strong{font-weight:600;color:var(--ink);}
  .article-body em{font-style:italic;color:var(--terra);}
  .article-body img{max-width:100%;margin:1.5em 0;}

  /* ── LOADING ── */
  .loading{padding:6rem 2rem;text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--mist);font-size:1.2rem;}
</style>
</head>
<body class="theme-sunny">

<!-- SVG noise filter for paper grain -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <filter id="grain" x="0%" y="0%" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch" result="n"/>
    <feColorMatrix type="saturate" values="0" in="n"/>
  </filter>
</svg>

<div class="topbar">
  <a href="index.html" class="back-link">← 回到回廊</a>
  <div class="theme-picker">
    <span class="theme-label">心情</span>
    <button class="theme-btn active" style="background:#faf6ee;border-color:#a07830" onclick="setTheme('sunny',this)" title="晴">☀</button>
    <button class="theme-btn" style="background:#eef2f5" onclick="setTheme('rain',this)" title="雨">🌧</button>
    <button class="theme-btn" style="background:#f2f7f2" onclick="setTheme('spring',this)" title="春">🌸</button>
    <button class="theme-btn" style="background:#f7f0e6" onclick="setTheme('autumn',this)" title="秋">🍂</button>
    <button class="theme-btn" style="background:#1c1a2e" onclick="setTheme('night',this)" title="夜">🌙</button>
    <button class="theme-btn" style="background:#f4f7fc" onclick="setTheme('snow',this)" title="雪">❄</button>
  </div>
</div>

<div class="article-outer">
  <div class="paper" id="paper">
    <div class="paper-edge"></div>
    <div class="paper-grain"></div>
    <div class="paper-extra"></div>

    <div class="deco deco-sunny">
<!-- ★ SUN top-right — VISIBLE, warm gold -->
      <svg width="110" height="110" viewBox="0 0 110 110" style="top:-14px;right:-14px;">
        <circle cx="55" cy="55" r="20" fill="#c8962e" opacity="0.35"/>
        <g stroke="#c8962e" stroke-width="2" stroke-linecap="round" opacity="0.3">
          <line x1="55" y1="12" x2="55" y2="26"/><line x1="55" y1="84" x2="55" y2="98"/>
          <line x1="12" y1="55" x2="26" y2="55"/><line x1="84" y1="55" x2="98" y2="55"/>
          <line x1="24" y1="24" x2="34" y2="34"/><line x1="76" y1="76" x2="86" y2="86"/>
          <line x1="86" y1="24" x2="76" y2="34"/><line x1="34" y1="76" x2="24" y2="86"/>
        </g>
      </svg>
      <!-- Warm swirl bottom-left — visible -->
      <svg width="200" height="200" viewBox="0 0 200 200" style="bottom:-50px;left:-50px;">
        <circle cx="100" cy="100" r="80" fill="none" stroke="#c8962e" stroke-width="0.8" opacity="0.12"/>
        <circle cx="100" cy="100" r="60" fill="none" stroke="#c8962e" stroke-width="0.6" opacity="0.09"/>
        <circle cx="100" cy="100" r="42" fill="none" stroke="#c8962e" stroke-width="0.4" opacity="0.06"/>
      </svg>
      <!-- Bottom: wheat/grass — visible at bottom edge -->
      <svg width="100%" height="120" viewBox="0 0 600 120" style="bottom:0;left:0;right:0" preserveAspectRatio="none">
        <g stroke="#b89850" fill="none" stroke-linecap="round" opacity="0.14">
          <path d="M40,120 Q42,85 38,50" stroke-width="1"/><path d="M38,60 Q30,52 24,46" stroke-width="0.7"/><path d="M38,70 Q46,62 52,56" stroke-width="0.7"/>
          <path d="M80,120 Q82,90 78,55" stroke-width="1"/><path d="M78,65 Q70,55 64,48" stroke-width="0.7"/><path d="M78,75 Q86,66 92,58" stroke-width="0.7"/>
          <path d="M130,120 Q128,88 132,52" stroke-width="1"/><path d="M132,62 Q124,52 118,44" stroke-width="0.7"/><path d="M132,72 Q140,64 146,55" stroke-width="0.7"/>
          <path d="M540,120 Q538,82 542,48" stroke-width="1"/><path d="M542,58 Q534,48 528,40" stroke-width="0.7"/><path d="M542,68 Q550,60 556,52" stroke-width="0.7"/>
          <path d="M580,120 Q582,90 578,60" stroke-width="1"/><path d="M578,70 Q570,60 564,52" stroke-width="0.7"/><path d="M578,80 Q586,72 592,64" stroke-width="0.7"/>
        </g>
        <!-- Wheat heads -->
        <g fill="#c8962e" opacity="0.18">
          <ellipse cx="38" cy="48" rx="2.5" ry="5" transform="rotate(-5,38,48)"/>
          <ellipse cx="24" cy="44" rx="2" ry="4" transform="rotate(-15,24,44)"/>
          <ellipse cx="52" cy="54" rx="2" ry="4" transform="rotate(12,52,54)"/>
          <ellipse cx="78" cy="53" rx="2.5" ry="5" transform="rotate(-3,78,53)"/>
          <ellipse cx="64" cy="46" rx="2" ry="4" transform="rotate(-12,64,46)"/>
          <ellipse cx="92" cy="56" rx="2" ry="4" transform="rotate(10,92,56)"/>
          <ellipse cx="132" cy="50" rx="2.5" ry="5" transform="rotate(2,132,50)"/>
          <ellipse cx="542" cy="46" rx="2.5" ry="5" transform="rotate(-4,542,46)"/>
          <ellipse cx="578" cy="58" rx="2.5" ry="5" transform="rotate(-2,578,58)"/>
        </g>
      </svg>
      <!-- Over-text area: tiny warm dots, LOW opacity -->
      <svg width="100%" height="100%" viewBox="0 0 400 520" style="inset:0" preserveAspectRatio="none">
        <g fill="#c8962e" opacity="0.025">
          <circle cx="200" cy="180" r="3"/><circle cx="300" cy="300" r="2.5"/><circle cx="100" cy="400" r="3"/>
        </g>
      </svg>
    </div>

    <div class="deco deco-rain">
<!-- ★ Cloud top-right — smooth single shape -->
      <svg width="150" height="75" viewBox="0 0 150 75" style="top:4px;right:6px;">
        <path d="M20,58 Q10,58 10,48 Q10,40 18,38 Q16,28 26,24 Q34,20 42,24 Q46,14 58,12 Q70,10 78,18 Q84,10 96,10 Q110,10 114,22 Q122,18 130,24 Q140,30 136,42 Q144,46 142,54 Q140,60 132,60Z" fill="#7a9eb8" opacity="0.22"/>
        <!-- Inner cloud highlight -->
        <path d="M40,50 Q34,50 34,42 Q34,36 42,35 Q44,28 54,26 Q62,24 68,30 Q72,24 82,24 Q92,24 94,34 Q100,32 106,36 Q112,40 108,48 Q114,50 112,54 Q110,56 104,56Z" fill="#8aaec4" opacity="0.1"/>
      </svg>
      <!-- ★ Rain drops — sharp near, visible -->
      <svg width="100%" height="100%" viewBox="0 0 400 520" style="inset:0" preserveAspectRatio="none">
        <g fill="#5a8aaa">
          <!-- Edge drops — MORE visible -->
          <ellipse cx="28" cy="90" rx="2.2" ry="5.5" opacity="0.18" transform="rotate(8,28,90)"/>
          <ellipse cx="15" cy="180" rx="2" ry="5" opacity="0.14" transform="rotate(6,15,180)"/>
          <ellipse cx="380" cy="120" rx="2.2" ry="5.5" opacity="0.16" transform="rotate(10,380,120)"/>
          <ellipse cx="390" cy="250" rx="2" ry="5" opacity="0.15" transform="rotate(5,390,250)"/>
          <ellipse cx="25" cy="350" rx="2.2" ry="5.5" opacity="0.16" transform="rotate(9,25,350)"/>
          <ellipse cx="385" cy="400" rx="2" ry="5" opacity="0.14" transform="rotate(7,385,400)"/>
          <!-- Over-text drops — LOW opacity -->
          <ellipse cx="180" cy="160" rx="1.5" ry="3.5" opacity="0.04" transform="rotate(7,180,160)"/>
          <ellipse cx="250" cy="280" rx="1.5" ry="3.5" opacity="0.035" transform="rotate(8,250,280)"/>
          <ellipse cx="300" cy="400" rx="1.5" ry="3.5" opacity="0.04" transform="rotate(6,300,400)"/>
        </g>
      </svg>
      <!-- ★ Bottom: puddles & ripples — VISIBLE -->
      <svg width="100%" height="80" viewBox="0 0 600 80" style="bottom:0;left:0;right:0" preserveAspectRatio="none">
        <g fill="none" stroke="#5a8aaa" opacity="0.18">
          <ellipse cx="60" cy="55" rx="40" ry="10" stroke-width="0.8"/>
          <ellipse cx="60" cy="55" rx="24" ry="6" stroke-width="0.5"/>
          <ellipse cx="60" cy="55" rx="10" ry="3" stroke-width="0.3"/>
          <ellipse cx="200" cy="60" rx="35" ry="9" stroke-width="0.7"/>
          <ellipse cx="200" cy="60" rx="20" ry="5" stroke-width="0.4"/>
          <ellipse cx="380" cy="50" rx="42" ry="11" stroke-width="0.8"/>
          <ellipse cx="380" cy="50" rx="26" ry="7" stroke-width="0.5"/>
          <ellipse cx="380" cy="50" rx="12" ry="3.5" stroke-width="0.3"/>
          <ellipse cx="530" cy="58" rx="30" ry="8" stroke-width="0.7"/>
          <ellipse cx="530" cy="58" rx="16" ry="4.5" stroke-width="0.4"/>
        </g>
        <!-- Splash dots -->
        <g fill="#5a8aaa" opacity="0.12">
          <circle cx="60" cy="42" r="1.5"/><circle cx="55" cy="38" r="1"/><circle cx="66" cy="39" r="0.8"/>
          <circle cx="380" cy="36" r="1.5"/><circle cx="375" cy="32" r="1"/><circle cx="386" cy="33" r="0.8"/>
        </g>

      </svg>
      <!-- ★ Bottom: snow drift / ground — VISIBLE -->
      <svg width="100%" height="100" viewBox="0 0 600 100" style="bottom:0;left:0;right:0" preserveAspectRatio="none">
        <!-- Gentle snow mounds -->
        <path d="M0,80 Q50,55 120,65 Q200,75 280,58 Q360,42 440,60 Q520,78 600,62 L600,100 L0,100Z" fill="#e4ecf5" opacity="0.3"/>
        <path d="M0,88 Q80,70 160,78 Q250,86 340,72 Q430,58 520,74 Q570,82 600,76 L600,100 L0,100Z" fill="#dce6f2" opacity="0.2"/>
        <!-- Snowflakes landing on ground -->
        <use href="#sf-b" transform="translate(60,52) scale(0.9)" opacity="0.18"/>

        <g fill="#4a7090" opacity="0.12">
          <circle cx="100" cy="68" r="1.2"/><circle cx="240" cy="62" r="1"/><circle cx="420" cy="58" r="1.3"/><circle cx="560" cy="65" r="1"/>

    <div class="loading" id="loading">正在打开…</div>
    <div id="article-content" style="display:none">
      <div class="article-date" id="art-date"></div>
      <h1 class="article-title" id="art-title"></h1>
      <div class="article-divider"></div>
      <div class="article-body" id="art-body"></div>
    </div>
  </div>
</div>

<script>
const REPO = 'lilith2025-pixel/memory-corridor';

function setTheme(name, btn) {
  document.body.className = 'theme-' + name;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  localStorage.setItem('mc_article_theme', name);
}

// Restore saved theme
const savedTheme = localStorage.getItem('mc_article_theme');
if (savedTheme) {
  const btn = document.querySelector(`[title="${{sunny:'晴',rain:'雨',spring:'春',autumn:'秋',night:'夜',snow:'雪'}[savedTheme]}"]`);
  if (btn) setTheme(savedTheme, btn);
}

function parseFM(text) {
  const m = text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  if (!m) return { _body: text };
  const obj = { _body: m[2].trim() };
  m[1].split('\n').forEach(line => {
    const i = line.indexOf(':');
    if (i < 0) return;
    const key = line.slice(0, i).trim();
    let val = line.slice(i+1).trim().replace(/^["']|["']$/g, '');
    if (val === 'true') val = true;
    else if (val === 'false') val = false;
    obj[key] = val;
  });
  return obj;
}

async function loadArticle() {
  const params = new URLSearchParams(location.search);
  const filename = params.get('f');
  if (!filename) { document.getElementById('loading').textContent = '找不到文章'; return; }

  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/_writings/${filename}`);
    if (!r.ok) throw new Error();
    const data = await r.json();
    const text = atob(data.content.replace(/\n/g,''));
    const decoded = decodeURIComponent(escape(text));
    const article = parseFM(decoded);

    document.title = (article.title || '文章') + ' · 记忆回廊';
    document.getElementById('art-date').textContent = article.date || '';
    document.getElementById('art-title').textContent = article.title || '';

    const bodyEl = document.getElementById('art-body');
    if (article._body) {
      // If body looks like HTML, render directly; otherwise wrap in paragraphs
      if (article._body.trim().startsWith('<')) {
        bodyEl.innerHTML = article._body;
      } else {
        bodyEl.innerHTML = article._body.split('\n\n').map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
      }
    } else {
      bodyEl.innerHTML = '<p style="color:var(--mist);font-style:italic">这篇文章还没有正文。</p>';
    }

    // Apply article's saved theme if any
    if (article.theme) {
      const themeMap = {sunny:'晴',rain:'雨',spring:'春',autumn:'秋',night:'夜',snow:'雪'};
      const btn = document.querySelector(`[title="${themeMap[article.theme]}"]`);
      if (btn && !savedTheme) setTheme(article.theme, btn);
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('article-content').style.display = 'block';
  } catch(e) {
    document.getElementById('loading').textContent = '加载失败，请返回重试。';
  }
}

loadArticle();
</script>
</body>
